
workflows:
  ios-native-workflow:
    name: iOS Native
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: kr.moveto.codeapp
      vars:
        BUNDLE_ID: kr.moveto.codeapp
        XCODE_PROJECT: "Code.xcodeproj"
        XCODE_SCHEME: "Code App"
        APP_STORE_APPLE_ID: 1555555551
      xcode: latest
    scripts:
      - name: Generate Secrets
        script: |
          echo "let JUDGE0_ENDPOINT = \"${JUDGE0_ENDPOINT:-}\"" > CodeApp/Constants/Secrets.swift
          echo "let JUDGE0_KEY = \"${JUDGE0_KEY:-}\"" >> CodeApp/Constants/Secrets.swift
      - name: Update bundle identifier
        script: |
          python3 -c "
          import os
          bundle_id = os.environ.get('BUNDLE_ID', 'thebaselab.VS-Code')
          for filepath in ['Code.xcodeproj/project.pbxproj', 'CodeApp/Managers/AppExtensionService.swift']:
              if os.path.exists(filepath):
                  print(f'Updating bundle ID in {filepath} to {bundle_id}...')
                  with open(filepath, 'r') as file:
                      content = file.read()
                  content = content.replace('thebaselab.VS-Code', bundle_id)
                  with open(filepath, 'w') as file:
                      file.write(content)
          "
      - name: Download external frameworks and resources
        script: |
          chmod +x downloadFrameworks.sh
          ./downloadFrameworks.sh
      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles --warn-only
      - name: Increment build number
        script: | 
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            UPDATED_BUILD_NUMBER=$BUILD_NUMBER
          else
            UPDATED_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          fi
          agvtool new-version -all $UPDATED_BUILD_NUMBER
      - name: Build ipa for distribution
        script: | 
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - jhyunwoo0228@gmail.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration

        # Configuration related to TestFlight (optional)
        # Note: This action is performed during post-processing.
        submit_to_testflight: true
        beta_groups: # Specify the names of beta tester groups that will get access to the build once it has passed beta review.
          - Team (Expo)

        # Configuration related to App Store (optional)
        # Note: This action is performed during post-processing.
        submit_to_app_store: false

